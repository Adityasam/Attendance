<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#22303F">
  <link rel="manifest" href="/static/manifest.json">
  <title>Login — Arch Attendance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body class="login-body">
  <!-- Background blobs -->
  <div class="bg-blobs" aria-hidden="true">
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>
    <div class="bg-blob bg-blob-3"></div>
  </div>

  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <img src="/static/icons/icon-144.png" alt="Arch" class="login-logo">
        <h1 class="login-title">Arch</h1>
        <p class="login-sub">Attendance Management</p>
      </div>
      {% if error %}
      <div class="alert alert-danger py-2 text-center" role="alert">
        <i class="fa-solid fa-triangle-exclamation me-1"></i>{{ error }}
      </div>
      {% endif %}
      <form method="POST" action="/login" id="loginForm">
        <div class="mb-3">
          <label class="form-label text-muted small">Username</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
            <input type="text" class="form-control" name="username" id="username"
                   placeholder="Enter username" required autocomplete="username">
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label text-muted small">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
            <input type="password" class="form-control" name="password" id="password"
                   placeholder="Enter password" required autocomplete="current-password">
            <button class="btn btn-outline-secondary" type="button" id="togglePwd">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 btn-lg login-btn">
          <i class="fa-solid fa-right-to-bracket me-2"></i>Sign In
        </button>
      </form>
      <p class="text-center text-muted mt-3 small">Arch Attendance v1.0</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById('togglePwd').addEventListener('click', () => {
      const pwd = document.getElementById('password');
      const icon = document.querySelector('#togglePwd i');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        pwd.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    });
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(console.error);
    }
  </script>
</body>
</html>
